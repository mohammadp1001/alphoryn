name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Ruff — zero violations required (constitution Principle II)
  # ---------------------------------------------------------------------------
  ruff:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install "ruff>=0.5.0"

      - name: Check for violations
        run: python -m ruff check alphoryn/ tests/

  # ---------------------------------------------------------------------------
  # Job 2: Tests — unit + contract (fast feedback), then integration +
  # full 100% coverage gate (constitution Principle II)
  # ---------------------------------------------------------------------------
  test:
    name: pytest — unit · contract · integration (100% coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Unit and contract tests (fast feedback, no coverage)
        run: python -m pytest tests/unit tests/contract -q --no-header --no-cov

      - name: Integration tests with full coverage gate
        # Runs all tests (unit + contract + integration) to compute correct
        # global coverage. The --cov-fail-under=100 gate is in pyproject.toml.
        run: python -m pytest -q --no-header
