name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install deps
        run: uv pip install --system -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy . --ignore-missing-imports
        continue-on-error: true  # advisory until type stubs are complete

  unit-tests:
    name: Unit tests (3.13)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install deps
        run: uv pip install --system -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/unit/ \
            -v --tb=short \
            --cov=agent --cov=tools --cov=db --cov=infra --cov=models --cov=cli --cov=evals \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=100

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-3.13
          path: coverage.xml

  safety:
    name: Dependency security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - name: Audit dependencies
        run: pip-audit --requirement pyproject.toml || true

  all-checks:
    name: All checks passed
    needs: [lint-and-type, unit-tests, safety]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.lint-and-type.result }}" != "success" ]; then
            echo "Lint/type-check failed — fix ruff errors before merging"
            exit 1
          fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "Unit tests or coverage gate failed — all tests must pass at 100% coverage"
            exit 1
          fi
          echo "All required checks passed"
